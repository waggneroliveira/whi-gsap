<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHI WebGL Hero</title>

<link rel="stylesheet" href="style.css">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" onload="this.onload=null,this.rel='stylesheet'">
<noscript>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
</noscript>
<script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<!-- =========================
SECTION: Tecnologias Interativa
Requer: GSAP, ScrollTrigger, Lenis e Three.js (CDNs já incluídos por você)
========================= -->
<section class="tech-section" id="tech">
    
    <!-- Canvas Three.js -->
    <canvas id="tech-canvas"></canvas>

    <div class="tech-container">

        <!-- Texto lateral -->
        <div class="tech-side">
            <div class="tech-side-inner">
                <span class="tech-line"></span>
                <p class="tech-label">STACK</p>
            </div>
        </div>

        <!-- Conteúdo -->
        <div class="tech-content">

            <h2 class="tech-title">
                +20 tecnologias fazem<br>
                rotina diária com a WHI
            </h2>

            <!-- Ícones -->
            <div class="tech-icons">

                <div class="tech-icon" data-depth="1">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg">
                </div>

                <div class="tech-icon" data-depth="2">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg">
                </div>

                <div class="tech-icon" data-depth="3">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg">
                </div>

                <div class="tech-icon" data-depth="2">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg">
                </div>

                <div class="tech-icon" data-depth="4">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/laravel/laravel-original.svg">
                </div>

                <div class="tech-icon" data-depth="1">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg">
                </div>

                <div class="tech-icon" data-depth="3">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg">
                </div>

                <div class="tech-icon" data-depth="2">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">
                </div>

                <div class="tech-icon" data-depth="4">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg">
                </div>

                <div class="tech-icon" data-depth="1">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/threejs/threejs-original.svg">
                </div>

            </div>

        </div>

    </div>

</section>


<style>
/* =========================
BASE
========================= */

.tech-section {
    position: relative;
    min-height: 100vh;
    background: #0d0d0d;
    overflow: hidden;
    display: flex;
    align-items: center;
}

#tech-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.tech-container {
    position: relative;
    z-index: 2;
    display: flex;
    width: 100%;
    max-width: 1400px;
    margin: auto;
    padding: 100px 40px;
}


/* =========================
SIDE TEXT
========================= */

.tech-side {
    width: 120px;
    display: flex;
    align-items: center;
}

.tech-side-inner {
    display: flex;
    align-items: center;
    gap: 15px;
    transform: rotate(-90deg);
}

.tech-line {
    width: 60px;
    height: 2px;
    background: #00ffa3;
}

.tech-label {
    color: #00ffa3;
    font-size: 12px;
    letter-spacing: 4px;
}


/* =========================
CONTENT
========================= */

.tech-content {
    flex: 1;
}

.tech-title {
    color: white;
    font-size: 48px;
    font-weight: 300;
    margin-bottom: 60px;
}


/* =========================
ICONS
========================= */

.tech-icons {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

.tech-icon {
    width: 60px;
    height: 60px;
    opacity: 0;
    transform: translateY(60px) scale(0.8);
    cursor: pointer;
}

.tech-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}


/* hover */

.tech-icon:hover {
    transform: scale(1.2) !important;
}


/* responsive */

@media(max-width:768px){

    .tech-container{
        flex-direction: column;
    }

    .tech-side{
        display:none;
    }

    .tech-title{
        font-size:32px;
    }

}
</style>


<script>
/* =========================
LENIS INIT
========================= */

const lenis = new Lenis({
    smooth: true,
    lerp: 0.08
})

function raf(time) {
    lenis.raf(time)
    requestAnimationFrame(raf)
}
requestAnimationFrame(raf)


/* =========================
GSAP SCROLL ANIMATION
========================= */

gsap.registerPlugin(ScrollTrigger)

gsap.to(".tech-icon", {

    scrollTrigger: {
        trigger: ".tech-section",
        start: "top center",
    },

    y: 0,
    opacity: 1,
    scale: 1,
    stagger: 0.1,
    duration: 1,
    ease: "power3.out"

})


/* parallax mouse */

document.querySelectorAll(".tech-icon").forEach(icon => {

    let depth = icon.dataset.depth

    window.addEventListener("mousemove", e => {

        let x = (window.innerWidth / 2 - e.clientX) * depth * 0.01
        let y = (window.innerHeight / 2 - e.clientY) * depth * 0.01

        gsap.to(icon,{
            x,
            y,
            duration:1
        })

    })

})


/* =========================
THREE JS BACKGROUND
========================= */

const canvas = document.getElementById("tech-canvas")

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
)

camera.position.z = 5

const renderer = new THREE.WebGLRenderer({
    canvas,
    alpha:true
})

renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)


/* particles */

const particlesGeometry = new THREE.BufferGeometry()

const particlesCount = 800

const posArray = new Float32Array(particlesCount * 3)

for(let i=0;i<particlesCount*3;i++){

    posArray[i] = (Math.random() - 0.5) * 10

}

particlesGeometry.setAttribute(
    "position",
    new THREE.BufferAttribute(posArray,3)
)

const particlesMaterial = new THREE.PointsMaterial({
    size:0.02,
    color:"#00ffa3"
})

const particlesMesh = new THREE.Points(
    particlesGeometry,
    particlesMaterial
)

scene.add(particlesMesh)


/* animation */

function animate(){

    requestAnimationFrame(animate)

    particlesMesh.rotation.y += 0.0005
    particlesMesh.rotation.x += 0.0003

    renderer.render(scene,camera)

}

animate()


/* resize */

window.addEventListener("resize", ()=>{

    camera.aspect = window.innerWidth/window.innerHeight
    camera.updateProjectionMatrix()

    renderer.setSize(window.innerWidth,window.innerHeight)

})


/* =========================
SCROLL ROTATION EFFECT
========================= */

ScrollTrigger.create({

    trigger: ".tech-section",
    start:"top bottom",
    end:"bottom top",
    scrub:true,

    onUpdate:(self)=>{

        particlesMesh.rotation.y = self.progress * Math.PI

    }

})
</script>
</body>
</html>
