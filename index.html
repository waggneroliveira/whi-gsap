<!-- Header UI -->
<div id="header-ui">
    <a href="#" class="social">IG</a>
    <a href="#" class="social">TW</a>
    <button id="btn-contact">FALE CONOSCO</button>
</div>

</div>

<!-- Content panels -->
<div class="content">
    <div class="wrap">
        <div class="panel panel-1">
            <div class="text-block rethink-sans-bold">
                <span class="line font-60">Domine o digital.</span>
                <span class="line accent font-60">Transforme visitantes em clientes.</span>
            </div>
        </div>
    
        <div class="panel panel-2">
            <div class="text-block rethink-sans-bold font-60">
                <span class="line">Experiência envolvente</span>
                <span class="line accent">que encanta e fideliza.</span>
            </div>
        </div>
    
        <div class="panel panel-3">
            <div class="text-block rethink-sans-bold font-60">
                <span class="line">Design moderno</span>
                <span class="line accent">com performance máxima.</span>
            </div>
        </div>
    
        <div class="panel panel-4">
            <div class="text-block rethink-sans-bold font-60">
                <span class="line">O futuro do seu negócio</span>
                <span class="line accent">começa agora, com a gente.</span>
            </div>
        </div>
    </div>
</div>
